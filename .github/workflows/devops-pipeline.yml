name: CI/CD Pipeline PFE Oussama Chagma

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  trivy-scan:
    name: Security Scan(Trivy)
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Scan Online Boutique frontend image
        run: |
          trivy image gcr.io/google-samples/microservices-demo/frontend:v0.10.1 \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            --format table

      - name: Scan Kubernetes manifests
        run: |
          trivy config ./release/kubernetes-manifests.yaml \
            --severity HIGH,CRITICAL \
            --exit-code 0
        continue-on-error: true

  sonarqube-scan:
    name: Code Quality(SonarQube)
    runs-on: self-hosted
    needs: trivy-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Run SonarQube analysis
        run: |
          sonar-scanner \
            -Dsonar.projectKey=microservices-demo \
            -Dsonar.sources=. \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.exclusions="**/*.java,**/vendor/**,**/*.pb.go,**/*.js,**/*.ts,**/*.css" \
            -Dsonar.java.binaries=.

  deploy:
    name: Deploy to Kubernetes
    runs-on: self-hosted
    needs: sonarqube-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verify cluster connection
        run: |
          kubectl get nodes

      - name: Deploy Online Boutique
        run: |
          kubectl apply -f ./release/kubernetes-manifests.yaml

      - name: Verify deployment
        run: |
          kubectl get pods
          kubectl get service frontend-external
