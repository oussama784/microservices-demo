name: CI/CD pipeline of oussama

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  trivy-scan:
    name: Security Scan(Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Scan Online Boutique frontend image
        run: |
          trivy image gcr.io/google-samples/microservices-demo/frontend:v0.10.1 \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            --format table
        continue-on-error: true

      - name: Scan Kubernetes manifests
        run: |
          trivy config ./release/kubernetes-manifests.yaml \
            --severity HIGH,CRITICAL \
            --exit-code 0
        continue-on-error: true

  sonarqube-scan:
    name: Code Quality(SonarQube)
    runs-on: ubuntu-latest
    needs: trivy-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install sonar-scanner
        run: |
          wget -q https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-6.2.1.4610-linux-x64.zip
          unzip -q sonar-scanner-cli-6.2.1.4610-linux-x64.zip
          sudo mv sonar-scanner-6.2.1.4610-linux-x64 /opt/sonar-scanner
          sudo ln -sf /opt/sonar-scanner/bin/sonar-scanner /usr/local/bin/sonar-scanner

      - name: Run SonarQube analysis
        run: |
          sonar-scanner \
            -Dsonar.projectKey=microservices-demo \
            -Dsonar.sources=. \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.exclusions="**/*.java,**/vendor/**,**/*.pb.go,**/*.js,**/*.ts,**/*.css"
        continue-on-error: true

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: sonarqube-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.33.5'

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > ~/.kube/config

      - name: Validate Kubernetes manifests
        run: |
          kubectl apply -f ./release/kubernetes-manifests.yaml --dry-run=client
          echo " All manifests are valid"

      - name: Deployment summary
        run: |
          echo " Cluster: Azure Stack Hub dc2"
          echo " Kubernetes version: v1.33.5"
          echo " Namespace: default"
          echo " Application: Online Boutique (11 microservices)"
          echo " Network: Calico CNI"
          echo " Deployment validated successfully"
